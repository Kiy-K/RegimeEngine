# Battle of Moscow (1941): Partisan Warfare & Economic Logistics
# ================================================================
# Simulates Operation Typhoon and the Soviet winter counteroffensive:
#   Oct 2, 1941 – Jan 7, 1942
#   German Army Group Center (von Bock) vs. Soviet Western Front (Zhukov)
#
# 9 sectors representing key operational areas:
#   0  Moscow City Center        — Soviet capital, factories, high resources
#   1  Yaroslavl Rail Hub        — Soviet supply node, connects reserves
#   2  Tula Defense Line         — Southern fortified position, industrial
#   3  Soviet Strategic Reserve  — Deep reserves east of Moscow
#   4  Bryansk Forest            — Partisan stronghold, contested wilderness
#   5  Vyazma Rail Hub           — Axis supply depot, partisan target
#   6  Smolensk Forward Base     — German staging area, Army Group HQ
#   7  Kalinin Northern Front    — Northern pincer toward Moscow
#   8  Klin-Solnechnogorsk       — Closest Axis approach to Moscow
#
# Key features beyond Stalingrad:
#   - Logistics links: graph-based supply network with sabotage mechanics
#   - Terrain types: forest, urban, fortified, rail, open (nonlinear combat)
#   - Partisan warfare: sabotage, ambush, recruitment from contested zones
#   - Economic production/consumption per sector
#   - Seasonal effects: winter degrades Axis throughput

# ── Training config ─────────────────────────────────────────────────────── #
training:
  total_timesteps: 3000000
  n_envs: 8
  mode: curriculum
  use_subproc: true
  population: false

# ── GravitasParams overrides ─────────────────────────────────────────────── #
params:
  # Government — Soviet wartime command structure
  ideology: STALINISM
  government_type: SUPREME_SOVIET

  # National Spirit — Soviet Red Army: boosts morale, lowers base org
  national_spirit: soviet_red_army

  # Topology
  n_clusters_min: 9
  n_clusters_max: 9
  dt: 0.01

  # Stability dynamics — extended front, not urban ruins
  alpha_sigma: 0.06       # faster recovery than Stalingrad (more rear area)
  nu_sigma:    0.07       # moderate spatial diffusion
  beta_sigma:  1.40       # hazard suppresses stability (lower than Stalingrad)

  # Resource dynamics — logistics-focused
  alpha_res:       0.05   # moderate resource recovery (factories running)
  hazard_res_cost: 0.20   # combat burns resources

  # Granular resources — Moscow: functioning industry, rail network, but winter+partisan strain
  res_fuel_production:      0.04    # moderate fuel from industry (Baku oil via rail)
  res_ammo_production:      0.05    # Moscow factories still producing ammunition
  res_ration_production:    0.05    # agricultural hinterland + rationing system
  res_steel_production:     0.05    # Moscow/Tula industrial base intact
  res_medical_production:   0.03    # field hospitals, but stretched thin
  res_fuel_military_cost:   0.09    # mobile warfare burns fuel (Operation Typhoon)
  res_ammo_combat_cost:     0.10    # field battles less ammo-intensive than urban
  res_ration_pop_cost:      0.05    # large population to feed (Moscow civilians)
  res_steel_repair_cost:    0.06    # fortification construction, vehicle repair
  res_medical_casualty_cost: 0.08   # heavy casualties but not Stalingrad-level
  res_fuel_hazard_cost:     0.07    # partisan raids + Luftwaffe raids on fuel depots
  res_trade_rate:           0.03    # rail network still functioning (partisan sabotage risk)
  # Resource feedback — logistics disruption is the key threat
  res_fuel_mil_penalty:     0.025   # immobile units in winter without fuel
  res_ammo_hazard_boost:    0.03    # standard
  res_ration_sigma_cost:    0.03    # winter rations critical for morale
  res_ration_trust_cost:    0.025   # civilian hunger during siege
  res_steel_resource_cost:  0.015   # standard
  res_medical_sigma_cost:   0.025   # frostbite + combat casualties

  # Military dynamics — mobile warfare + partisan disruption
  max_military_total:      0.85   # not total war yet (Operation Typhoon phase)
  military_exh_coeff:      0.40   # advancing exhausts troops
  military_decay:          0.025  # troops degrade faster in winter
  military_hazard_reduction: 0.50 # field warfare: less effective than urban
  military_sigma_boost:    0.20   # garrison provides some stability
  military_tau_cost:       0.15   # occupation erodes trust
  military_phi_coeff:      0.10   # moderate fragmentation from military

  # Trust / polarization — ideological (partisan recruitment depends on trust)
  tau_decay:            0.03   # trust erodes under occupation
  alpha_pol:            0.10   # polarization builds
  beta_pol:             0.07   # depolarization somewhat faster than Stalingrad
  propaganda_pol_coeff: 0.18   # propaganda effect
  psi_propaganda_cost:  0.12   # coherence cost

  # Exhaustion — advancing German army, Russian winter
  alpha_exh:  0.07   # exhaustion builds steadily
  beta_exh:   0.04   # slightly faster recovery (not encircled)

  # Hawkes shock process — partisan raids + winter storms
  hawkes_base_rate: 0.035
  hawkes_alpha:     0.18    # moderate self-excitation
  hawkes_beta:      0.35    # faster decay than Stalingrad
  shock_pareto_alpha: 2.2   # slightly lighter tails
  shock_pareto_xmin:  0.10

  # Diplomacy — inter-sector coordination
  nu_alliance:      0.05
  nu_res_alliance:  0.05    # logistics alliance sharing more important
  alpha_hostility:  0.04    # partisan territory is hostile
  alliance_decay:   0.005
  diplomacy_shift:  0.10

  # Media / propaganda
  rho_bias:      0.88
  beta_max_bias: 0.55
  media_autonomy: 0.30

  # Reward weights — logistics and partisan disruption are the key challenge
  w_stability:            1.40
  w_fragmentation:        0.60
  w_polarization:         0.80
  w_exhaustion:           1.80    # still important but less than Stalingrad
  w_resilience:           0.60
  w_smoothness:           0.25
  w_unsustainable:        2.20
  w_resource_balance:     0.90    # balanced supply matters (partisan sabotage targets weakest)
  w_resource_critical:    1.40    # critical shortages in winter = frozen army
  w_resource_improvement: 0.50    # reward improving logistics network

  # Termination
  collapse_exhaustion:    0.92
  collapse_hazard_mean:   1.70
  collapse_polarization:  0.95
  collapse_fragmentation: 0.93

  # Episode length — ~100 days of fighting
  max_steps: 500

# ── Operational sectors ──────────────────────────────────────────────────── #
sectors:
  - id: 0
    name: MoscowCityCenter
    side: Soviet
    terrain: urban
    description: "Soviet capital. Factories, government, dense population."
    initial_state:
      sigma:    0.60
      hazard:   0.15
      resource: 0.80
      military: 0.50
      trust:    0.70
      polar:    0.30
    production: 0.05
    consumption: 0.03
    resource_production:            # capital city — ZiS factory, hospitals, population
      fuel: 0.8                     # some fuel storage, no refineries
      ammo: 1.2                     # ZiS and small arms factories
      rations: 1.8                  # massive population, rationing system, bakeries
      steel: 1.4                    # ZiS automotive works, machining plants
      medical: 2.0                  # major hospital network, pharmaceutical production

  - id: 1
    name: YaroslavlRailHub
    side: Soviet
    terrain: rail
    description: "Critical northern rail junction. Connects Moscow to reserves."
    initial_state:
      sigma:    0.55
      hazard:   0.10
      resource: 0.85
      military: 0.35
      trust:    0.60
      polar:    0.20
    production: 0.03
    consumption: 0.01
    resource_production:            # logistics hub — distributes everything
      fuel: 1.6                     # fuel tanker cars from Baku via Gorky
      ammo: 1.0                     # ammunition in transit from Urals
      rations: 1.2                  # grain shipments from east
      steel: 1.3                    # Yaroslavl tire factory + rubber plant
      medical: 0.8                  # medical supplies in transit

  - id: 2
    name: TulaDefenseLine
    side: Soviet
    terrain: fortified
    description: "Southern industrial city. Fortified defense line blocks southern approach."
    initial_state:
      sigma:    0.50
      hazard:   0.30
      resource: 0.60
      military: 0.55
      trust:    0.55
      polar:    0.35
    production: 0.04
    consumption: 0.02
    resource_production:            # Tula Arms Factory — weapons industry
      fuel: 0.4                     # minor fuel storage
      ammo: 2.0                     # Tula Arms Plant — premier ammunition producer
      rations: 0.6                  # small city, some local agriculture
      steel: 1.8                    # ironworks, armaments manufacturing
      medical: 0.5                  # city hospital

  - id: 3
    name: SovietStrategicReserve
    side: Soviet
    terrain: open
    description: "Deep reserves east of Moscow. Fresh Siberian divisions arriving."
    initial_state:
      sigma:    0.70
      hazard:   0.05
      resource: 0.75
      military: 0.60
      trust:    0.65
      polar:    0.15
    production: 0.02
    consumption: 0.01
    resource_production:            # deep rear — Ural war production arriving
      fuel: 1.5                     # fuel reserves stockpiled for counteroffensive
      ammo: 1.6                     # Sverdlovsk/Chelyabinsk factory output
      rations: 1.3                  # agricultural surplus from east
      steel: 1.4                    # Magnitogorsk steel arriving by rail
      medical: 1.5                  # well-equipped rear hospitals

  - id: 4
    name: BryanskForest
    side: Contested
    terrain: forest
    description: "Dense forests south of Moscow. Partisan stronghold. Low stability."
    initial_state:
      sigma:    0.30
      hazard:   0.25
      resource: 0.25
      military: 0.10
      trust:    0.40
      polar:    0.50
    production: 0.01
    consumption: 0.005
    resource_production:            # forest — partisan foraging, sabotage base
      fuel: 0.1                     # captured fuel caches
      ammo: 0.2                     # scavenged and airdropped supplies
      rations: 1.0                  # forest foraging, hunting, hidden farms
      steel: 0.0                    # no industry in deep forest
      medical: 0.3                  # herbal medicine, partisan field medics

  - id: 5
    name: VyazmaRailHub
    side: Axis
    terrain: rail
    description: "German supply depot. Critical logistics node. Partisan sabotage target."
    initial_state:
      sigma:    0.65
      hazard:   0.20
      resource: 0.85
      military: 0.45
      trust:    0.30
      polar:    0.40
    production: 0.02
    consumption: 0.04
    resource_production:            # Axis supply depot — main logistics node
      fuel: 1.8                     # fuel dumps for Panzer groups
      ammo: 1.5                     # ammunition stockpile
      rations: 0.7                  # German field rations from Reich
      steel: 1.0                    # spare parts, engineering materials
      medical: 0.6                  # Wehrmacht field hospital

  - id: 6
    name: SmolenskForwardBase
    side: Axis
    terrain: open
    description: "Army Group Center HQ. Staging area for Operation Typhoon."
    initial_state:
      sigma:    0.70
      hazard:   0.10
      resource: 0.70
      military: 0.55
      trust:    0.25
      polar:    0.35
    production: 0.02
    consumption: 0.03
    resource_production:            # Army Group Center staging area
      fuel: 1.4                     # fuel reserves for armoured thrust
      ammo: 1.3                     # corps-level ammunition stores
      rations: 1.0                  # organized field kitchens
      steel: 0.8                    # vehicle maintenance depot
      medical: 1.0                  # army-level hospital

  - id: 7
    name: KalininNorthernFront
    side: Axis
    terrain: open
    description: "Northern pincer. 3rd Panzer Group advancing toward Moscow."
    initial_state:
      sigma:    0.55
      hazard:   0.30
      resource: 0.50
      military: 0.60
      trust:    0.20
      polar:    0.45
    production: 0.01
    consumption: 0.03
    resource_production:            # advancing front — consuming, not producing
      fuel: 0.5                     # some forward fuel dumps
      ammo: 0.6                     # field resupply
      rations: 0.3                  # overextended supply lines
      steel: 0.2                    # mobile repair only
      medical: 0.4                  # field aid stations

  - id: 8
    name: KlinSolnechnogorsk
    side: Axis
    terrain: open
    description: "Closest Axis approach to Moscow. 30km from the Kremlin."
    initial_state:
      sigma:    0.50
      hazard:   0.35
      resource: 0.45
      military: 0.65
      trust:    0.15
      polar:    0.50
    production: 0.00
    consumption: 0.04
    resource_production:            # spearhead — end of supply line, frozen
      fuel: 0.2                     # last drops, vehicles freezing
      ammo: 0.3                     # rationed, resupply sporadic
      rations: 0.1                  # troops starving in -30°C
      steel: 0.1                    # no repair capability forward
      medical: 0.2                  # frostbite overwhelming medics

# ── Logistics network (graph edges with capacity) ────────────────────────── #
# Each link represents a rail/road connection.
# capacity: max resource flow per step through this link
# vulnerability: base probability of sabotage success on this link
logistics_links:
  - {from: 0, to: 1, capacity: 0.15, vulnerability: 0.05}   # Moscow ↔ Yaroslavl (secure)
  - {from: 0, to: 2, capacity: 0.12, vulnerability: 0.08}   # Moscow ↔ Tula
  - {from: 0, to: 8, capacity: 0.08, vulnerability: 0.15}   # Moscow ↔ Klin (threatened)
  - {from: 1, to: 3, capacity: 0.20, vulnerability: 0.03}   # Yaroslavl ↔ Reserves (deep)
  - {from: 1, to: 7, capacity: 0.10, vulnerability: 0.12}   # Yaroslavl ↔ Kalinin (frontline)
  - {from: 2, to: 4, capacity: 0.08, vulnerability: 0.20}   # Tula ↔ Bryansk (forest, risky)
  - {from: 4, to: 5, capacity: 0.06, vulnerability: 0.35}   # Bryansk ↔ Vyazma (partisan zone!)
  - {from: 5, to: 6, capacity: 0.15, vulnerability: 0.10}   # Vyazma ↔ Smolensk (Axis rear)
  - {from: 6, to: 7, capacity: 0.12, vulnerability: 0.08}   # Smolensk ↔ Kalinin
  - {from: 7, to: 8, capacity: 0.10, vulnerability: 0.12}   # Kalinin ↔ Klin

# ── Terrain types for nonlinear combat ───────────────────────────────────── #
terrain:
  urban:
    defender_multiplier: 2.0
    hazard_multiplier: 1.3
    movement_cost: 1.5
  fortified:
    defender_multiplier: 2.5
    hazard_multiplier: 1.0
    movement_cost: 2.0
  forest:
    defender_multiplier: 1.5
    hazard_multiplier: 0.8
    movement_cost: 1.8
    partisan_bonus: 0.3
  rail:
    defender_multiplier: 0.8
    hazard_multiplier: 1.0
    movement_cost: 0.5
    sabotage_vulnerability: 0.2
  open:
    defender_multiplier: 1.0
    hazard_multiplier: 1.0
    movement_cost: 1.0

