# ── Physics configuration ───────────────────────────────────────────────── #
# Points to the terrain YAML consumed by physics.py load_map_physics()
physics_config: gravitas/scenarios/moscow_terrain.yaml

# ── Sector positions (km) for LOS heatmap + direction vectors ──────────── #
# Coordinates are approximate geographic positions projected onto a 2D plane
# centered on Moscow.  Used by build_los_state() to compute pairwise distance,
# elevation-aware visibility, and direction vectors for the combat resolver.
sector_positions:
  # id: [x_km, y_km]   — x = east, y = north
  0: [0.0,   0.0]      # Moscow City Center (origin)
  1: [30.0,  60.0]     # Yaroslavl Rail Hub (NE)
  2: [-20.0, -50.0]    # Tula Defense Line (S)
  3: [60.0,  20.0]     # Soviet Strategic Reserve (E)
  4: [-80.0, -60.0]    # Bryansk Forest (SW)
  5: [-120.0, -20.0]   # Vyazma Rail Hub (W)
  6: [-180.0, -10.0]   # Smolensk Forward Base (far W)
  7: [-40.0,  70.0]    # Kalinin Northern Front (NW)
  8: [-30.0,  30.0]    # Klin-Solnechnogorsk (close NW)

# ── Combat physics — damage model & armor classes ──────────────────────── #
# Declares per-sector dominant unit profiles so the engine can pre-compute
# damage effectiveness and LOS engagement tables.
# armor_class / primary_damage values reference enums in unit_types.py.
combat_physics:
  # Soviet sectors — mostly unarmored infantry with some fortified positions
  sector_profiles:
    0: {dominant_armor: UNARMORED,    dominant_damage: SMALL_ARMS,    has_aa: true}
    1: {dominant_armor: UNARMORED,    dominant_damage: HE,            has_aa: false}
    2: {dominant_armor: FORTIFIED,    dominant_damage: AP_COMPOSITE,  has_aa: false}
    3: {dominant_armor: HEAVY_ARMOR,  dominant_damage: AP_KINETIC,    has_aa: false}
    4: {dominant_armor: UNARMORED,    dominant_damage: SMALL_ARMS,    has_aa: false}
    # Axis sectors — mechanised with armor support
    5: {dominant_armor: LIGHT_ARMOR,  dominant_damage: SMALL_ARMS,    has_aa: false}
    6: {dominant_armor: HEAVY_ARMOR,  dominant_damage: AP_KINETIC,    has_aa: false}
    7: {dominant_armor: MEDIUM_ARMOR, dominant_damage: AP_KINETIC,    has_aa: false}
    8: {dominant_armor: MEDIUM_ARMOR, dominant_damage: AP_KINETIC,    has_aa: false}

  # Global engagement rules
  engagement:
    max_direct_fire_km: 3.0      # Direct-fire engagement cap (tanks, AT guns)
    max_indirect_fire_km: 15.0   # Artillery / rocket engagement cap
    max_air_strike_km: 50.0      # Air strike range cap
    los_quality_threshold: 0.20  # Below this, engagement accuracy halved
    smoke_duration_steps: 5      # Smoke screen duration in physics steps

# ── Agents ──────────────────────────────────────────────────────────────── #
agents:
  - name: GermanArmyGroupCenter
    side: Axis
    policy: RecurrentPPO
    controlled_clusters: [5, 6, 7, 8]
    primary_objective: [capture_moscow, hold_rail_hubs, suppress_partisans]
    diplomacy_bias: suppress_partisans

  - name: SovietWesternFront
    side: Soviet
    controlled_clusters: [0, 1, 2, 3]
    policy: RecurrentPPO
    primary_objective: [defend_moscow, support_partisans, counterattack]
    diplomacy_bias: coordinate_with_partisans

# ── Call of War (CoW) native military config ────────────────────────────── #
# Used by the CoW-native military system (extensions/military/).
# All combat, production, supply, and research mechanics are built into
# military_dynamics.py — no plugin system needed for core military.
cow_military:
  # Per-faction resource income per step: [rations, steel, ammo, fuel, medical]
  axis_income:   [4.0, 3.5, 2.5, 2.0, 1.0]
  soviet_income: [3.5, 4.0, 2.5, 1.5, 1.5]

  # Per-cluster building presets (CowBuildingType → level)
  # Sectors without entry get empty buildings
  cluster_buildings:
    # Sector 0: Moscow — major city with barracks, factory, bunker
    - {BARRACKS: 2, FACTORY: 1, BUNKER: 1, SUPPLY_DEPOT: 1}
    # Sector 1: Yaroslavl — rail hub, supply depot
    - {BARRACKS: 1, SUPPLY_DEPOT: 2}
    # Sector 2: Tula — fortified industrial, arms factory
    - {BARRACKS: 2, FACTORY: 2, BUNKER: 2}
    # Sector 3: Soviet Reserve — staging area
    - {BARRACKS: 1, SUPPLY_DEPOT: 1}
    # Sector 4: Bryansk Forest — contested wilderness, no buildings
    - {}
    # Sector 5: Vyazma — Axis supply depot
    - {BARRACKS: 1, FACTORY: 1, SUPPLY_DEPOT: 2}
    # Sector 6: Smolensk — Army Group Center HQ
    - {BARRACKS: 2, FACTORY: 1, AIRFIELD: 1, SUPPLY_DEPOT: 1}
    # Sector 7: Kalinin — northern front
    - {BARRACKS: 1}
    # Sector 8: Klin — spearhead, minimal infrastructure
    - {}

  # Regime-level integration: national spirits and government types per faction
  # These feed into CowExternalModifiers via the spirit/government bridge functions
  faction_modifiers:
    0:  # Axis (Wehrmacht)
      national_spirit: "german_blitzkrieg"
      government_type: "INNER_CIRCLE"
    1:  # Soviet (Red Army)
      national_spirit: "soviet_patriotic_war"
      government_type: "SUPREME_SOVIET"

  # Military objectives for each faction
  objectives:
    - objective_id: 0
      name: "Capture Moscow"
      objective_type: capture
      target_cluster_id: 0
      faction_id: 0           # Axis
      required_strength: 30
    - objective_id: 1
      name: "Hold Tula Defense Line"
      objective_type: hold
      target_cluster_id: 2
      faction_id: 1           # Soviet
      required_strength: 20
      hold_required: 30
    - objective_id: 2
      name: "Defend Moscow"
      objective_type: hold
      target_cluster_id: 0
      faction_id: 1           # Soviet
      required_strength: 30
      hold_required: 50
    - objective_id: 3
      name: "Secure Vyazma Supply Line"
      objective_type: hold
      target_cluster_id: 5
      faction_id: 0           # Axis
      required_strength: 15
      hold_required: 20

  # ── Physics Engine Configuration ─────────────────────────────────────────
  # Drives terrain detail, weather simulation, supply logistics, LOS, and
  # equipment reliability via extensions/military/physics.py
  map_physics:
    name: "Moscow 1941"
    n_sectors: 9

    climate:
      type: continental
      # Temperature curve: {step → °C} — interpolated between keys
      # Oct start ≈ 5°C, drops to −25°C by mid-winter, recovers late
      temperature_curve:
        0:   5.0     # early October
        30:  0.0     # late October
        60: -8.0     # mid November
        90: -18.0    # early December
        120: -25.0   # mid December (peak cold)
        150: -20.0   # January
        180: -12.0   # February
        200: -5.0    # late scenario
      humidity: 65.0
      wind_ms: 6.0
      steps_per_day: 4

    sectors:
      0:
        name: Moscow
        terrain: URBAN
        elevation_m: 156
        cover: 0.7
        soil: CLAY
        features: {river: false, rail: true, road: true, airfield: true, port: false}
        fortification: 0.4
        initial_supply:
          axis:   {fuel: 5,   ammo: 5,   food: 5,   medical: 1,  spare_parts: 2,  winter_gear: 0}
          soviet: {fuel: 100, ammo: 100, food: 100, medical: 20, spare_parts: 30, winter_gear: 15}
      1:
