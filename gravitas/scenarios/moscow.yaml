# ── Notes ────────────────────────────────────────────────────────────────── #
# 1. Sector 4 (Bryansk Forest) is Contested — neither agent controls it directly.
# 2. logistics_links define the supply network graph (used as adjacency for CoW system).
# 3. terrain types map to CowTerrain: urban→URBAN, fortified→URBAN+bunker,
#    forest→FOREST, rail→PLAINS, open→PLAINS.
# 4. The CoW military system handles all combat, production, supply, and research
#    natively — no external plugins required for core military mechanics.
# 5. Training: python tests/train_moscow_selfplay.py --regime-file gravitas/scenarios/moscow.yaml
# 6. Physics engine (physics.py) provides weather, terrain detail, supply logistics,
#    LOS, and equipment reliability.  Set physics_enabled: true in scenario config
#    to activate.  The map_physics section above configures per-sector terrain and climate.
