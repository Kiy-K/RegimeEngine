          axis:   {fuel: 10,  ammo: 10,  food: 10,  medical: 2,  spare_parts: 3,  winter_gear: 1}
          soviet: {fuel: 90,  ammo: 90,  food: 90,  medical: 18, spare_parts: 28, winter_gear: 14}
      3:
